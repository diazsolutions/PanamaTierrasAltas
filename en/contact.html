<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PanamáTierrasAltas</title>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
        body { font-family: var(--font-sans); }
        h1, h2, h3 { font-family: var(--font-display); }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <!-- Header -->
    <header class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/en/index.html" class="flex items-center gap-2">
                <span class="text-2xl font-bold text-emerald-800 tracking-tight">Panamá<span class="text-stone-500 font-light">TierrasAltas</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="/en/index.html" class="text-stone-600 hover:text-emerald-700 transition-colors">Home</a>
                <a href="/en/destinations.html" class="text-stone-600 hover:text-emerald-700 transition-colors">Destinations</a>
                <a href="/en/activities.html" class="text-stone-600 hover:text-emerald-700 transition-colors">Activities</a>
                <a href="/en/tips.html" class="text-stone-600 hover:text-emerald-700 transition-colors">Tips</a>
                <a href="/en/contact.html" class="text-emerald-900 font-medium border-b-2 border-emerald-600">Contact</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex bg-stone-100 p-1 rounded-full border border-stone-200">
                    <a href="/es/contacto.html" class="px-3 py-1 rounded-full text-xs font-bold text-stone-400 hover:text-stone-600">ES</a>
                    <a href="/en/contact.html" class="px-3 py-1 rounded-full bg-white shadow-sm text-xs font-bold text-emerald-800">EN</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-2 gap-16">
            <div>
                <h1 class="text-4xl md:text-6xl font-bold mb-8">Let's Talk</h1>
                <p class="text-xl text-stone-600 mb-12">Have questions about your next trip to the highlands? We're here to help you plan the perfect adventure.</p>
                
                <div class="space-y-8">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center text-emerald-700 shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold">Email</h4>
                            <p class="text-stone-500">info@panamatierrasaltas.com</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center text-emerald-700 shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold">Phone</h4>
                            <p class="text-stone-500">+507 0000-0000</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-stone-100">
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-stone-700 mb-2">Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-stone-700 mb-2">Email</label>
                            <input type="email" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">Subject</label>
                        <input type="text" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">Message</label>
                        <textarea rows="5" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all"></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-stone-900 text-stone-400 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2026 Panamá Tierras Altas.</p>
        </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
